# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

# New release instructions:
# check `cargo clippy --all-features` and `cargo test`
# example for TAG=0.2.0
# cargo about generate about.hbs > LICENSES/RUST_DEPENDENCIES.html
# git-cliff -t ${TAG} -o CHANGELOG.md && git add . && git commit -m 'chore(release): Update changelog for v"${TAG}"' && git push
# patch release:
# cargo release patch --dry-run
# cargo release patch --execute
# minor release:
# cargo release minor --dry-run
# cargo release minor --execute

[changelog]
# Standard Conventional Commit body.
header = """
# Changelog

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}
"""
trim = true

[git]
# Use Conventional Commits for parsing.
conventional_commits = true

# Do NOT filter out commits that don't match the spec.
filter_unconventional = false

# Parsers for standard Conventional Commit types and custom patterns.
commit_parsers = [
    # 1. SKIP ALL MERGES (PRs, branch merges, remote-tracking merges)
    { message = "^[Mm]erge ", skip = true },

    # 2. SKIP WEBLATE TRANSLATION CHORES (Omitted to keep release notes focused on code changes)
    { message = "^[Tt]ranslated using Weblate", skip = true },
    { message = "^[Aa]dded translation using Weblate", skip = true },
    { message = "^Update translation files", skip = true },
    { message = "^Translation ", skip = true },

    # 3. SKIP AUTOMATED RELEASE COMMITS & VERSION BUMPS
    { message = "^[Cc]hore: Release", skip = true },
    { message = "^[Cc]hore\\(release\\)", skip = true },
    { message = "^[Rr]elease ", skip = true },
    { message = "^[Pp]rep(aring)? for (crate |v)?[0-9a-fA-Fv.]* release", skip = true },
    { message = "^[Pp]rep for v", skip = true },

    # 4. SKIP FORMATTING, LINTING, AND TRANSLATION CONFIG MAINTENANCE
    { message = "^chore:.*(fmt|lint|ktlint|cleanup|sweep)", skip = true },
    { message = "^[Cc]hore: [Ll]int", skip = true },
    { message = "^chore\\(android\\): regenerate", skip = true },
    { message = "^chore\\(auth\\): regenerate", skip = true },
    { message = "^chore\\(fdroid\\)", skip = true },
    { message = "^Cargo\\.lock", skip = true },
    { message = "^ci:", skip = true },

    # 5. CATEGORIZE LEGACY UI LABELS
    { message = "^\\[(GUI|TUI)\\]", group = "<!-- 5 -->🎨 UI/UX Improvements" },

    # 6. CONVENTIONAL COMMIT TYPING
    { message = "^feat", group = "<!-- 0 -->🚀 Features" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^refactor", group = "<!-- 2 -->🚜 Refactor" },
    { message = "^doc", group = "<!-- 3 -->📚 Documentation" },
    { message = "^perf", group = "<!-- 4 -->⚡ Performance" },
    { message = "^style", group = "<!-- 5 -->🎨 Styling" },
    { message = "^test", group = "<!-- 6 -->🧪 Testing" },
    { message = "^chore", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
    { message = "^revert", group = "<!-- 9 -->◀️ Revert" },

    # 7. MAP RAW REPEATED KEYWORDS (Handles legacy commits without strict headers)
    { message = "^[Rr]eadme|^[Dd]oc", group = "<!-- 3 -->📚 Documentation" },
    { message = "^[Aa]dd unit tests|^[Tt]est", group = "<!-- 6 -->🧪 Testing" },

    # 8. CATCH-ALL FOR HISTORICAL/UNCONVENTIONAL COMMITS
    { message = ".*", group = "<!-- 10 -->💼 Other" },
]

# Sort commits within groups by oldest first to show chronological progression.
sort_commits = "oldest"
